    <body>

        <div class="Calculator">
            <input type="text" readonly name="" id="">
            <div class="all-btns">

                <button class="btn fifteen">3</button>
                <button class="btn sixteen">+</button>
                <button class="btn seventeen">0</button>
                <button class="btn eighteen">%</button>
                <button class="btn ninteen">AC</button>
                <button class="btn twenty">=</button>
            </div>
        </div>

        <script src="./index.js"></script>
    </body>

    <script>

        const allBtns = document.querySelectorAll("button")
        const inp = document.querySelector("input")

        allBtns.forEach((btn) => {
            btn.addEventListener('click', (e) => {
                const val = e.target.innerText
                
                if(val == "=") {
                    inp.value = eval(inp.value)
                } else {
                    
                }
            })
        })

    </script>
